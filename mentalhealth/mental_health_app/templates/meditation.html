{% extends 'base.html' %}

{% block content %}
<div class="hero-section">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center hero-content">

                <h1 class="mb-4">
                    <i class="fas fa-om text-success"></i> Meditation
                </h1>

                <p class="lead mb-5">Take a moment to relax and focus your mind.</p>

                <!-- Music Selection -->
                <div class="music-selection mb-4">

                    <h5 class="mb-3 text-white">Choose Calm Music</h5>

                    <div class="music-buttons mb-3">
                        <button class="btn btn-outline-light me-2 mb-2 music-btn" data-music="flute">🎵 Flute</button>
                        <button class="btn btn-outline-light me-2 mb-2 music-btn" data-music="piano">🎹 Piano</button>
                        <button class="btn btn-outline-light me-2 mb-2 music-btn" data-music="nature">🌿 Nature</button>
                        <button class="btn btn-outline-light mb-2 music-btn" data-music="ocean">🌊 Ocean</button>
                    </div>

                    <div class="music-controls">
                        <button class="btn btn-success me-2" id="playMusic">
                            <i class="fas fa-play"></i> Play Music
                        </button>

                        <button class="btn btn-danger" id="stopMusic" disabled>
                            <i class="fas fa-stop"></i> Stop Music
                        </button>
                    </div>

                </div>

                <!-- Timer -->
                <div class="timer-container mb-4">
                    <div class="timer-display" id="timerDisplay">05:00</div>
                </div>

                <!-- Duration Selection -->
                <div class="mb-4">
                    <h5 class="mb-3">Choose Duration</h5>

                    <div class="btn-group">

                        <button class="btn btn-outline-primary time-btn" data-time="5">5 min</button>

                        <button class="btn btn-outline-primary time-btn" data-time="10">10 min</button>

                        <button class="btn btn-outline-primary time-btn" data-time="15">15 min</button>

                    </div>
                </div>

                <!-- Controls -->
                <div class="mb-4">

                    <button class="btn btn-success btn-lg me-2" id="startBtn">
                        <i class="fas fa-play"></i> Start
                    </button>

                    <button class="btn btn-warning btn-lg me-2" id="pauseBtn" disabled>
                        <i class="fas fa-pause"></i> Pause
                    </button>

                    <button class="btn btn-secondary btn-lg" id="resetBtn">
                        <i class="fas fa-redo"></i> Reset
                    </button>

                </div>

                <div id="message" class="alert alert-info" style="display:none;"></div>

            </div>
        </div>
    </div>
</div>

<!-- Hidden Audio -->
<audio id="meditationMusic" loop></audio>

<style>

.hero-section{
background:linear-gradient(135deg,rgba(0,0,0,0.5),rgba(0,0,0,0.3)),
url('https://images.unsplash.com/photo-1593811167562-9cef47bfc4d7?w=1200') center/cover;
color:white;
padding:100px 0;
}

.timer-display{
font-size:4rem;
font-weight:bold;
color:#28a745;
font-family:monospace;
}

.music-btn.active{
background:rgba(255,255,255,0.3);
border-color:white;
}

</style>

<script>

document.addEventListener("DOMContentLoaded",function(){

const timerDisplay=document.getElementById("timerDisplay")

const startBtn=document.getElementById("startBtn")

const pauseBtn=document.getElementById("pauseBtn")

const resetBtn=document.getElementById("resetBtn")

const messageDiv=document.getElementById("message")

const playMusic=document.getElementById("playMusic")

const stopMusic=document.getElementById("stopMusic")

const musicButtons=document.querySelectorAll(".music-btn")

const timeButtons=document.querySelectorAll(".time-btn")

let totalSeconds=300

let remainingSeconds=300

let interval=null

let isRunning=false

let isPaused=false


const musicLinks={
flute:"https://www.youtube.com/embed/1ZYbU82GVz4",

piano:"https://www.youtube.com/embed/1ZYbU82GVz4",

nature:"https://www.youtube.com/embed/eKFTSSKCzWA",

ocean:"https://www.youtube.com/embed/V1RPi2MYptM"
}


function updateDisplay(){

let minutes=Math.floor(remainingSeconds/60)

let seconds=remainingSeconds%60

timerDisplay.textContent=
String(minutes).padStart(2,"0")+":"+String(seconds).padStart(2,"0")

}


function startMeditation(){

if(!isRunning){

isRunning=true

pauseBtn.disabled=false

startBtn.disabled=true


interval=setInterval(()=>{

remainingSeconds--

updateDisplay()

if(remainingSeconds<=0){

clearInterval(interval)

showMessage("Meditation Complete 🌟","success")

resetMeditation()

}

},1000)

}

}


function pauseMeditation(){

if(!isPaused){

clearInterval(interval)

isPaused=true

pauseBtn.innerHTML='<i class="fas fa-play"></i> Resume'

}

else{

isPaused=false

pauseBtn.innerHTML='<i class="fas fa-pause"></i> Pause'

interval=setInterval(()=>{

remainingSeconds--

updateDisplay()

if(remainingSeconds<=0){

clearInterval(interval)

showMessage("Meditation Complete 🌟","success")

resetMeditation()

}

},1000)

}

}


function resetMeditation(){

clearInterval(interval)

isRunning=false

isPaused=false

remainingSeconds=totalSeconds

updateDisplay()

startBtn.disabled=false

pauseBtn.disabled=true

pauseBtn.innerHTML='<i class="fas fa-pause"></i> Pause'

}


function setTime(minutes,button){

if(!isRunning){

totalSeconds=minutes*60

remainingSeconds=totalSeconds

updateDisplay()

timeButtons.forEach(btn=>{

btn.classList.remove("btn-primary")

btn.classList.add("btn-outline-primary")

})

button.classList.remove("btn-outline-primary")

button.classList.add("btn-primary")

}

}


function showMessage(text,type){

messageDiv.innerText=text

messageDiv.className="alert alert-"+type

messageDiv.style.display="block"

setTimeout(()=>{

messageDiv.style.display="none"

},4000)

}


function playSelectedMusic(type){

let player=document.getElementById("youtubePlayer")

if(!player){

player=document.createElement("div")

player.id="youtubePlayer"

player.style.position="fixed"

player.style.bottom="20px"

player.style.right="20px"

player.style.width="300px"

player.style.height="200px"

document.body.appendChild(player)

}

player.innerHTML=`<iframe width="100%" height="100%" src="${musicLinks[type]}?autoplay=1" frameborder="0" allow="autoplay"></iframe>`

}


startBtn.addEventListener("click",startMeditation)

pauseBtn.addEventListener("click",pauseMeditation)

resetBtn.addEventListener("click",resetMeditation)


timeButtons.forEach(btn=>{

btn.addEventListener("click",()=>{

let time=btn.getAttribute("data-time")

setTime(time,btn)

})

})


musicButtons.forEach(btn=>{

btn.addEventListener("click",()=>{

let type=btn.getAttribute("data-music")

playSelectedMusic(type)

musicButtons.forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

})

})


updateDisplay()

})

</script>

{% endblock %}
